<p-drawer #drawerRef [(visible)]="visible" [modal]="true" (onHide)="onHide()">
  <ng-template #headless>
    <div class="flex flex-col h-full bg-white">
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-5 border-b border-black/10">
        <span class="text-sm font-bold tracking-tight" style="font-family: 'Sora', sans-serif">
        Hygieia
        </span>
        <p-button
          icon="pi pi-times"
          [text]="true"
          [plain]="true"
          styleClass="!text-[#0a0a0a] !w-7 !h-7"
          (onClick)="close()"
        />
      </div>
      <!-- Nav -->
      <div class="flex-1 overflow-y-auto px-3 py-4 flex flex-col gap-1">
        <p class="text-[10px] font-medium tracking-widest uppercase text-black/35 px-3 mb-1">
          Menu
        </p>
        <a class="nav-item" routerLink="overview" routerLinkActive="active" (click)="close()">
          <i class="pi pi-th-large text-sm"></i>
          Overview
        </a>
        <a class="nav-item" routerLink="appointments" routerLinkActive="active" (click)="close()">
          <i class="pi pi-calendar text-sm"></i>
          Appointments
        </a>
        <a class="nav-item" routerLink="vitals" routerLinkActive="active" (click)="close()">
          <i class="pi pi-heart text-sm"></i>
          Vitals
        </a>
        <a class="nav-item" routerLink="records" routerLinkActive="active" (click)="close()">
          <i class="pi pi-file text-sm"></i>
          Records
        </a>
        <a class="nav-item" routerLink="prescriptions" routerLinkActive="active" (click)="close()">
          <i class="pi pi-inbox text-sm"></i>
          Prescriptions
        </a>
        <p class="text-[10px] font-medium tracking-widest uppercase text-black/35 px-3 mt-4 mb-1">
          Tools
        </p>
        <a class="nav-item" routerLink="ai-chat" routerLinkActive="active" (click)="close()">
          <i class="pi pi-comment text-sm"></i>
          AI Assistant
        </a>
      </div>
      <!-- Footer -->
      <div class="border-t border-black/10 px-3 py-4">
<p-button
  label="Logout"
  icon="pi pi-sign-out"
  (onClick)="logout()"
  styleClass="!w-full !rounded-lg !bg-[#0a0a0a] !border-2 !border-[#0a0a0a] !text-white !text-sm !font-semibold !py-[13px] !shadow-none !transition-all !duration-300 hover:!opacity-80 !mt-1 [&_*]:!text-white [&_.p-button-icon]:!text-white"
/>
              </div>
    </div>
  </ng-template>
</p-drawer>
